/* Overlay oscuro encima de la textura para que el contenido sea legible */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.75) 100%);
  pointer-events: none;
  z-index: 0;
}


/* Watermark central — logo flotando sobre la textura */
.watermark {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(85vw, 700px);
  height: auto;
  opacity: 0.06;
  pointer-events: none;
  z-index: 0;
  filter: blur(0.3px);
}
@media (max-width: 600px) {
  .watermark { width: 110vw; opacity: 0.05; }
}

  inset: 0;
  background: #000;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  animation: splashOut 0.4s ease-in 1.8s forwards;
}

#splash::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.8) 70%);
}

.splash-flash {
  position: absolute;
  inset: 0;
  background: white;
  z-index: 3;
  animation: flash 0.5s ease-out forwards;
  pointer-events: none;
}

@keyframes flash {
  0% { opacity: 0; }
  15% { opacity: 1; }
  100% { opacity: 0; }
}

.splash-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 0 30px;
}

.splash-logo {
  width: min(80vw, 480px);
  height: auto;
  filter: drop-shadow(0 0 25px rgba(255,255,255,0.18));
  opacity: 0;
  transform: scale(1.15);
  animation: logoIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.35s forwards;
}

@keyframes logoIn {
  0% { opacity: 0; transform: scale(1.15); }
  60% { opacity: 1; transform: scale(0.97); }
  100% { opacity: 1; transform: scale(1); }
}

.splash-tagline {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: clamp(13px, 3vw, 18px);
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.85);
  margin-top: 18px;
  opacity: 0;
  animation: fadeUp 0.5s ease-out 0.85s forwards;
  white-space: nowrap;
}

.splash-subtitle {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: clamp(20px, 5vw, 32px);
  letter-spacing: 0.18em;
  color: white;
  margin-top: 22px;
  padding-top: 14px;
  border-top: 2px solid rgba(255,255,255,0.4);
  opacity: 0;
  animation: fadeUp 0.5s ease-out 1.05s forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes splashOut {
  to { opacity: 0; visibility: hidden; pointer-events: none; }
}

#splash.dismissed {
  animation: splashOut 0.3s ease-in forwards;
}

/* ============ APP LAYOUT ============ */
.app {
  position: relative;
  z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 16px 16px 60px;
  min-height: 100vh;
  opacity: 0;
  animation: appIn 0.5s ease-out 2.0s forwards;
}

@keyframes appIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 4px 18px;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.header-logo {
  height: 48px;
  width: auto;
  cursor: pointer;
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.12));
}

.header-actions {
  display: flex;
  gap: 8px;
}

.icon-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 36px;
  height: 36px;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}
.icon-btn:hover, .icon-btn:active { color: var(--text); border-color: var(--border-strong); }
.icon-btn.muted { color: var(--text-faint); }

/* ============ INPUT BLOCK ============ */
.input-block {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 22px 20px;
  margin-bottom: 20px;
  backdrop-filter: blur(16px) saturate(1.1);
  -webkit-backdrop-filter: blur(16px) saturate(1.1);
}

.input-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 12px;
  text-align: center;
}

.input-row {
  display: flex;
  gap: 10px;
  align-items: stretch;
}

#depositInput {
  flex: 1;
  background: #000;
  border: 2px solid var(--border-strong);
  border-radius: 6px;
  color: white;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 36px;
  text-align: center;
  padding: 12px 8px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -moz-appearance: textfield;
}
#depositInput::-webkit-outer-spin-button,
#depositInput::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
#depositInput:focus { border-color: white; box-shadow: 0 0 0 4px rgba(255,255,255,0.08); }

.input-suffix {
  display: flex;
  align-items: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 22px;
  color: var(--text-dim);
  padding: 0 6px;
}

#calcBtn {
  background: white;
  color: black;
  border: none;
  border-radius: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 18px;
  letter-spacing: 0.1em;
  padding: 14px 22px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
  box-shadow: 0 4px 0 rgba(255,255,255,0.15), 0 0 0 1px rgba(255,255,255,0.3);
}
#calcBtn:hover { transform: translateY(-1px); box-shadow: 0 5px 0 rgba(255,255,255,0.2), 0 0 0 1px rgba(255,255,255,0.4); }
#calcBtn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(255,255,255,0.1), 0 0 0 1px rgba(255,255,255,0.3); }

/* Warning */
.warning {
  background: rgba(60, 40, 10, 0.6);
  border: 1px solid rgba(200, 140, 40, 0.4);
  border-left: 4px solid #ffaa00;
  border-radius: 4px;
  padding: 10px 14px;
  font-size: 13px;
  color: #ffd47a;
  margin-bottom: 16px;
  font-weight: 600;
}

/* ============ TOTAL DISPLAY ============ */
.total-block {
  text-align: center;
  padding: 24px 16px 18px;
  margin-bottom: 18px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(16px) saturate(1.1);
  -webkit-backdrop-filter: blur(16px) saturate(1.1);
}

.total-label {
  position: relative;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.18em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.total-value {
  position: relative;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: clamp(54px, 13vw, 84px);
  line-height: 1;
  color: white;
  letter-spacing: -0.02em;
  text-shadow: 
    0 0 1px rgba(255,255,255,0.5),
    0 0 20px rgba(255,255,255,0.15),
    2px 2px 0 rgba(0,0,0,0.8);
}

.total-value .euro { font-size: 0.55em; vertical-align: super; margin-left: 4px; opacity: 0.85; }
.total-value .deco { display: block; height: 3px; background: linear-gradient(90deg, transparent, white, transparent); margin: 8px auto 0; width: 60%; }

.total-meta {
  position: relative;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin-top: 10px;
  text-transform: uppercase;
}

/* Restore button */
.restore-btn {
  display: none;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.1em;
  padding: 8px 14px;
  border-radius: 4px;
  cursor: pointer;
  margin: 0 auto 14px;
  text-transform: uppercase;
  transition: all 0.2s;
}
.restore-btn.visible { display: block; }
.restore-btn:hover { border-color: white; color: white; }

/* ============ PRODUCTS LIST ============ */
.products-list { display: flex; flex-direction: column; gap: 7px; }

.product {
  background: var(--panel);
  border: 1px solid var(--border);
  border-left: 4px solid var(--c, #444);
  border-radius: 4px;
  overflow: hidden;
  transition: all 0.25s;
  backdrop-filter: blur(14px) saturate(1.1);
  -webkit-backdrop-filter: blur(14px) saturate(1.1);
  opacity: 0;
  animation: prodIn 0.3s ease-out forwards;
}

@keyframes prodIn {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}

.product.disabled { opacity: 0.35; }
.product.edited { border-left-style: dashed; }

.product-header {
  display: flex;
  align-items: center;
  padding: 11px 12px;
  gap: 10px;
  cursor: pointer;
  user-select: none;
}

.product-check {
  appearance: none;
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border: 2px solid var(--c, #555);
  border-radius: 3px;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  background: transparent;
  transition: background 0.15s;
}
.product-check:checked { background: var(--c, white); }
.product-check:checked::after {
  content: '';
  position: absolute;
  left: 4px;
  top: 0px;
  width: 4px;
  height: 9px;
  border: solid black;
  border-width: 0 2.5px 2.5px 0;
  transform: rotate(45deg);
}

.product-info { flex: 1; min-width: 0; }
.product-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 16px;
  letter-spacing: 0.04em;
  color: var(--c, white);
  text-transform: uppercase;
  line-height: 1.15;
}
.product-name .edit-mark {
  font-size: 9px;
  color: var(--text-faint);
  margin-left: 6px;
  font-weight: 600;
  letter-spacing: 0.1em;
  vertical-align: middle;
}
.product-summary {
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 600;
  margin-top: 1px;
}

.product-price {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 17px;
  color: white;
  white-space: nowrap;
  text-align: right;
  min-width: 62px;
}
.product-price.empty { color: var(--text-faint); }

.product-toggle {
  color: var(--text-faint);
  font-size: 11px;
  margin-left: 4px;
  transition: transform 0.25s;
}
.product.expanded .product-toggle { transform: rotate(180deg); color: var(--c, white); }

.product-edit {
  display: none;
  padding: 12px 12px 14px;
  border-top: 1px solid var(--border);
  background: rgba(0, 0, 0, 0.5);
}
.product.expanded .product-edit { display: block; animation: editIn 0.25s ease-out; }

@keyframes editIn {
  from { opacity: 0; max-height: 0; }
  to { opacity: 1; max-height: 600px; }
}

.needed-info {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.05em;
  color: var(--text-faint);
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px dashed var(--border);
}
.needed-info .pct { color: var(--text-dim); margin-left: 6px; }
.needed-info .pct.under { color: #ffaa55; }
.needed-info .pct.over { color: #88dd88; }

.format-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 6px;
}

.format-row select, .format-row input {
  background: #0a0a0a;
  color: white;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 6px 8px;
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  font-weight: 600;
  outline: none;
}
.format-row select { flex: 1; cursor: pointer; }
.format-row select:focus, .format-row input:focus { border-color: var(--c, white); }
.format-row input { width: 50px; text-align: center; }

.format-row .price-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--text-dim);
  min-width: 50px;
  text-align: right;
}

.format-row .delete-btn {
  background: rgba(120, 30, 30, 0.4);
  color: #ff8080;
  border: 1px solid rgba(180, 60, 60, 0.5);
  width: 26px;
  height: 26px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.format-row .delete-btn:hover { background: rgba(180, 40, 40, 0.6); color: white; }

.add-format-btn {
  background: transparent;
  border: 1px dashed var(--border);
  color: var(--text-dim);
  padding: 6px 12px;
  border-radius: 3px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.08em;
  cursor: pointer;
  text-transform: uppercase;
  margin-top: 6px;
  width: 100%;
}
.add-format-btn:hover { border-color: var(--c, white); color: var(--c, white); }

/* ============ ACTIONS BAR ============ */
.actions-bar {
  margin-top: 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Botones de productos opcionales */
.opcionales-bar {
  margin-top: 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.add-opcional-btn {
  background: transparent;
  color: var(--c-op, #fff);
  border: 1.5px dashed var(--c-op, #fff);
  border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.12em;
  padding: 12px 14px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
  opacity: 0.7;
  text-align: center;
}
.add-opcional-btn:hover {
  opacity: 1;
  background: color-mix(in srgb, var(--c-op, #fff) 12%, transparent);
}

.action-btn {
  background: white;
  color: black;
  border: none;
  border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 0.12em;
  padding: 14px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
  box-shadow: 0 3px 0 rgba(255,255,255,0.15);
}
.action-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(255,255,255,0.1); }

.action-btn.secondary {
  background: transparent;
  color: white;
  border: 1px solid var(--border-strong);
  box-shadow: none;
}
.action-btn.secondary:hover { border-color: white; }

/* Toast */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: white;
  color: black;
  padding: 12px 22px;
  border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0;
  transition: all 0.3s;
  z-index: 50;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Empty state */
.empty-state {
  text-align: center;
  color: var(--text-faint);
  padding: 40px 20px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* Responsive tweaks */
@media (max-width: 420px) {
  .app { padding: 12px 12px 60px; }
  .input-row { flex-wrap: wrap; }
  #depositInput { flex: 1 1 60%; font-size: 30px; }
  #calcBtn { flex: 1 1 100%; padding: 12px; font-size: 16px; }
  .input-suffix { font-size: 18px; }
  .product-name { font-size: 15px; }
  .product-summary { font-size: 11px; }
  .product-price { font-size: 16px; min-width: 56px; }
}
</style>
</head>
<body>

<!-- ============ SPLASH SCREEN ============ -->
<div id="splash" onclick="dismissSplash()">

      { capacidad: 1000, precio: 50, label: '1L', inKitBuilder: true },
      { capacidad: 5000, precio: 200, label: '5L', inKitBuilder: true }
    ]},
  { id: 'silicate', nombre: 'SILICATE', color: 'var(--c-silicate)', unit: 'ml',
    consumoPorLitro: 2.45,
    formatos: [
      { capacidad: 250, precio: 18, label: '250ml', inKitBuilder: true },
      { capacidad: 500, precio: 30, label: '500ml', inKitBuilder: true },
      { capacidad: 1000, precio: 50, label: '1L', inKitBuilder: true },
      { capacidad: 5000, precio: 200, label: '5L', inKitBuilder: true }
    ]}
];

/* --- TOLERANCIA ---
   Secundarios: hasta 10% por debajo del consumo teórico (×1.10 sobre capacidad).
   Bases (GROW + BLOOM): SIEMPRE ≥100% (críticas para el cultivo). */
const TOLERANCIA = 1.10;
const PRODUCTOS_BASE = ['grow', 'bloom'];

/* --- OPTIMIZADOR ---
   Criterio: minimizar PRECIO total.
   Desempate: menos botes (más cómodo para el cliente).
   Búsqueda exhaustiva acotada con poda por mejor precio actual. */
function optimizar(consumoNecesario, formatos, esBase) {
  const tolerancia = esBase ? 1.0 : TOLERANCIA;
  const formatosKit = formatos.filter(f => f.inKitBuilder);
  if (formatosKit.length === 0) return null;
  
  // Caso especial: un solo formato (ej. BLUE ENERGY)
  if (formatosKit.length === 1) {
    const f = formatosKit[0];
    let unidades = Math.ceil(consumoNecesario / (f.capacidad * tolerancia));
    if (unidades < 1) unidades = 1;
    return [{ formato: f, unidades: unidades }];
  }
  
  const MAX_BOTES_TOTAL = 15;
  let mejorCombinacion = null;
  let mejorPrecio = Infinity;
  let mejorBotes = Infinity;
  
  function probar(combinacion, indiceFormato, botesUsados, precioAcum, capacidadAcum) {
    if (capacidadAcum * tolerancia >= consumoNecesario && botesUsados > 0) {
      if (precioAcum < mejorPrecio || (precioAcum === mejorPrecio && botesUsados < mejorBotes)) {
        mejorPrecio = precioAcum;
        mejorBotes = botesUsados;
        mejorCombinacion = combinacion.map(c => ({ formato: c.formato, unidades: c.unidades }));
      }
    }
    if (precioAcum > mejorPrecio) return;
    if (botesUsados >= MAX_BOTES_TOTAL) return;
    if (indiceFormato >= formatosKit.length) return;
    
    const formatoActual = formatosKit[indiceFormato];
    const maxUnidades = Math.min(MAX_BOTES_TOTAL - botesUsados,
      Math.ceil(consumoNecesario / formatoActual.capacidad) + 1);
    
    for (let u = 0; u <= maxUnidades; u++) {
      const nuevaComb = u > 0 ? [...combinacion, { formato: formatoActual, unidades: u }] : combinacion;
      probar(nuevaComb, indiceFormato + 1, botesUsados + u,
             precioAcum + formatoActual.precio * u,
             capacidadAcum + formatoActual.capacidad * u);
    }
  }
  
  probar([], 0, 0, 0, 0);
  return mejorCombinacion;
}

/* ============ ESTADO ============ */
let estado = {};
let depositoActual = 0;
let muted = false;

/* ============ AUDIO ============ */
// Campana de boxeo sintetizada con Web Audio API.
// Sin archivos externos, todo dentro del HTML.
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playBell() {
  if (muted) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  
  // "PAN PAN" — dos golpes secos de campana de ring
  // Primer golpe en t=0, segundo en t=0.13s
  fireBellHit(ctx, 0);
  fireBellHit(ctx, 0.13);
}

function fireBellHit(ctx, delay) {
  const now = ctx.currentTime + delay;
  
  // === MASTER ===
  const master = ctx.createGain();
  master.gain.value = 0.55;
  master.connect(ctx.destination);
  
  // === REVERB SINTÉTICA: cadena de delays cortos ===
  // Da la sensación de que la campana resuena en un espacio
  const reverbSend = ctx.createGain();
  reverbSend.gain.value = 0.18;
  reverbSend.connect(master);
  
  const delays = [0.013, 0.029, 0.041, 0.067];
  delays.forEach((d, i) => {
    const dn = ctx.createDelay(0.5);
    dn.delayTime.value = d;
    const dg = ctx.createGain();
    dg.gain.value = 0.25 / (i+1);
    dn.connect(dg);
    dg.connect(master);
    reverbSend.connect(dn);
  });
  
  // === ATAQUE: ruido del martillo golpeando el metal ===
  // Burst de ruido blanco filtrado, muy corto (~10ms)
  const noiseLen = 0.012;
  const noiseBuf = ctx.createBuffer(1, ctx.sampleRate * noiseLen, ctx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  for (let i = 0; i < nd.length; i++) {
    nd[i] = (Math.random() * 2 - 1) * (1 - i/nd.length); // ruido decreciente
  }
  const noise = ctx.createBufferSource();
  noise.buffer = noiseBuf;
  
  // Filtro pasa-banda para que el ruido suene a "metal golpeado"
  const noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 3500;
  noiseFilter.Q.value = 0.8;
  
  const noiseGain = ctx.createGain();
  noiseGain.gain.setValueAtTime(0, now);
  noiseGain.gain.linearRampToValueAtTime(0.7, now + 0.001);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, now + noiseLen);
  
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(master);
  noiseGain.connect(reverbSend);
  noise.start(now);
  noise.stop(now + noiseLen);
  
  // === CUERPO DE LA CAMPANA: parciales INARMÓNICOS ===
  // Frecuencias modales reales de un disco metálico circular (como una campana de ring)
  // Estas proporciones (1.0, 2.76, 5.40, 8.93...) son las de modos de vibración
  // de una placa circular libre, no armónicos enteros como un piano.
  const fundamental = 480; // ~A4# (típica de campana de ring grande)
  const partials = [
    { mult: 1.000, gain: 0.45, decay: 1.8 },   // Fundamental, decay largo
    { mult: 1.594, gain: 0.32, decay: 1.4 },   
    { mult: 2.760, gain: 0.40, decay: 1.0 },   // El "tono brillante"
    { mult: 3.012, gain: 0.18, decay: 0.9 },   // Cercano al anterior → batido
    { mult: 4.180, gain: 0.22, decay: 0.7 },
    { mult: 5.400, gain: 0.28, decay: 0.6 },
    { mult: 6.802, gain: 0.15, decay: 0.5 },
    { mult: 8.930, gain: 0.10, decay: 0.35 }   // Brillo agudo
  ];
  
  partials.forEach(({ mult, gain, decay }) => {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    // Pequeña desafinación aleatoria para "humanizar"
    osc.frequency.value = fundamental * mult * (1 + (Math.random() - 0.5) * 0.004);
    
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(gain, now + 0.002);
    g.gain.exponentialRampToValueAtTime(0.0001, now + decay);
    
    osc.connect(g);
    g.connect(master);
    g.connect(reverbSend);
    osc.start(now);
    osc.stop(now + decay + 0.05);
  });
  
  // === FILTRO HIGH-SHELF para añadir BRILLO METÁLICO ===
  // (Aplicado a través de un osc extra muy agudo con poco volumen)
  const shimmer = ctx.createOscillator();
  shimmer.type = 'sine';
  shimmer.frequency.value = fundamental * 12;
  const sg = ctx.createGain();
  sg.gain.setValueAtTime(0, now);
  sg.gain.linearRampToValueAtTime(0.04, now + 0.003);
  sg.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
  shimmer.connect(sg);
  sg.connect(master);
  shimmer.start(now);
  shimmer.stop(now + 0.45);
}

function toggleMute() {
  muted = !muted;
  const btn = document.getElementById('muteBtn');
  btn.textContent = muted ? '🔕' : '🔔';
  btn.classList.toggle('muted', muted);
  localStorage.setItem('lck_muted', muted ? '1' : '0');
  if (!muted) playBell(); // Demo al desmutear
}

/* ============ SPLASH ============ */
function dismissSplash() {
  const splash = document.getElementById('splash');
  splash.classList.add('dismissed');
  setTimeout(() => splash.style.display = 'none', 350);
}
// Auto-dismiss
setTimeout(() => {
  const splash = document.getElementById('splash');
  if (splash) splash.style.display = 'none';
}, 2400);

/* ============ CALCULATE ============ */
function calculate() {
  const input = document.getElementById('depositInput');
  const litros = parseFloat(input.value);
  
  if (!litros || litros <= 0) {
    showToast('Introduce un valor válido');
    input.focus();
    return;
  }
  
  depositoActual = litros;
  localStorage.setItem('lck_ultimo_deposito', litros);
  playBell();
  
  // Warning según tamaño
  const warningEl = document.getElementById('warning');
  if (litros < 50) {
    warningEl.innerHTML = '<div class="warning">Depósito muy pequeño. El kit puede tener producto sobrante. Considera venta suelta.</div>';
  } else if (litros > 2000) {
    warningEl.innerHTML = '<div class="warning">Depósito muy grande. Verifica los números antes de cerrar la venta.</div>';
  } else {
    warningEl.innerHTML = '';
  }
  
  // Calcular kit
  estado = {};
  for (const producto of PRODUCTS) {
    const consumoNecesario = producto.consumoPorLitro * litros;
    const esBase = PRODUCTOS_BASE.includes(producto.id);
    const sugerido = optimizar(consumoNecesario, producto.formatos, esBase);
    
    estado[producto.id] = {
      consumoNecesario: consumoNecesario,
      sugerido: sugerido,
      actual: sugerido ? sugerido.map(c => ({ formato: c.formato, unidades: c.unidades })) : null,
      activo: producto.opcional ? false : true,
      editado: false
    };
  }
  
  render();
}

/* ============ RENDER ============ */
function render() {
  const out = document.getElementById('output');
  
  let total = 0;
  let activosCount = 0;
  for (const producto of PRODUCTS) {
    const e = estado[producto.id];
    if (e && e.activo && e.actual) {
      activosCount++;
      for (const c of e.actual) {
        total += c.formato.precio * c.unidades;
      }
    }
  }
  
  const hayEdiciones = Object.values(estado).some(e => e.editado || !e.activo);
  
  let html = `
    <div class="total-block">
      <div class="total-label">PRECIO PVP DEL KIT</div>
      <div class="total-value">${total.toFixed(2).replace('.', ',')}<span class="euro">€</span><span class="deco"></span></div>
      <div class="total-meta">${activosCount} productos · depósito ${depositoActual}L</div>
    </div>
    <button class="restore-btn ${hayEdiciones ? 'visible' : ''}" onclick="restaurarTodo()">↺ RESTAURAR SUGERENCIA</button>
    <div class="products-list">
  `;
  
  let delay = 0;
  const opcionalesInactivos = [];
  for (const producto of PRODUCTS) {
    const e = estado[producto.id];
    if (!e || !e.actual) continue;
    
    // Productos opcionales desactivados → botón añadir, no card
    if (producto.opcional && !e.activo) {
      opcionalesInactivos.push(producto);
      continue;
    }
    
    const totalProducto = e.actual.reduce((s, c) => s + c.formato.precio * c.unidades, 0);
    const capacidadActual = e.actual.reduce((s, c) => s + c.formato.capacidad * c.unidades, 0);
    const resumen = e.actual.map(c => `${c.unidades}×${c.formato.label}`).join(' + ') || '—';
    const cobertura = e.consumoNecesario > 0 ? Math.round(capacidadActual / e.consumoNecesario * 100) : 0;
    
    const classes = ['product'];
    if (!e.activo) classes.push('disabled');
    if (e.editado) classes.push('edited');
    
    const colorVar = `--c: ${producto.color.replace('var(', '').replace(')', '')}`;
    const colorVal = getComputedStyle(document.documentElement).getPropertyValue(producto.color.replace('var(', '').replace(')', '').trim()).trim();
    
    html += `
      <div class="${classes.join(' ')}" id="prod-${producto.id}" style="--c: ${colorVal}; animation-delay: ${delay}ms;">
        <div class="product-header" onclick="toggleExpand('${producto.id}', event)">
          <input type="checkbox" class="product-check" ${e.activo ? 'checked' : ''} 
                 onclick="toggleActivo('${producto.id}', event)">
          <div class="product-info">
            <div class="product-name">${producto.nombre}${e.editado ? '<span class="edit-mark">EDITADO</span>' : ''}</div>
            <div class="product-summary">${resumen}</div>
          </div>
          <div class="product-price ${e.activo ? '' : 'empty'}">${e.activo ? totalProducto.toFixed(0) + '€' : '—'}</div>
          <div class="product-toggle">▼</div>
        </div>
        <div class="product-edit">
          <div class="needed-info">
            Necesario: ${formatCantidad(e.consumoNecesario, producto.unit)} · 
            Tienes: ${formatCantidad(capacidadActual, producto.unit)}
            <span class="pct ${cobertura < 100 ? 'under' : 'over'}">(${cobertura}%)</span>
          </div>
          ${renderEdicion(producto, e)}
          <button class="add-format-btn" onclick="addFormato('${producto.id}')">+ AÑADIR FORMATO</button>
        </div>
      </div>
    `;
    delay += 50;
  }
  
  html += '</div>';
  
  // Botones de productos opcionales no incluidos
  if (opcionalesInactivos.length > 0) {
    html += '<div class="opcionales-bar">';
    for (const prod of opcionalesInactivos) {
      const colorVal = getComputedStyle(document.documentElement)
        .getPropertyValue(prod.color.replace('var(', '').replace(')', '').trim()).trim();
      html += `<button class="add-opcional-btn" style="--c-op: ${colorVal}" onclick="activarOpcional('${prod.id}')">＋ AÑADIR ${prod.nombre}</button>`;
    }
    html += '</div>';
  }
  
  // Botones de acción
  if (activosCount > 0) {
    html += `
      <div class="actions-bar">
        <button class="action-btn" onclick="copiarLista()">📋 COPIAR LISTA</button>
      </div>
    `;
  }
  
  out.innerHTML = html;
}

function formatCantidad(valor, unit) {
  if (unit === 'gr') {
    if (valor >= 1000) return (valor/1000).toFixed(2).replace('.', ',') + ' kg';
    return Math.round(valor) + ' g';
  }
  if (valor >= 1000) return (valor/1000).toFixed(2).replace('.', ',') + ' L';
  return Math.round(valor) + ' ml';
}

function renderEdicion(producto, e) {
  const formatosDisponibles = producto.formatos;
  let html = '';
  e.actual.forEach((c, idx) => {
    html += `
      <div class="format-row">
        <select onchange="cambiarFormato('${producto.id}', ${idx}, this.value)">
          ${formatosDisponibles.map(f => 
            `<option value="${f.label}" ${f.label === c.formato.label ? 'selected' : ''}>${f.label} — ${f.precio}€</option>`
          ).join('')}
        </select>
        <input type="number" min="0" value="${c.unidades}" onchange="cambiarUnidades('${producto.id}', ${idx}, this.value)" inputmode="numeric">
        <span class="price-tag">${(c.formato.precio * c.unidades).toFixed(0)}€</span>
        <button class="delete-btn" onclick="eliminarFormato('${producto.id}', ${idx})">×</button>
      </div>
    `;
  });
  return html;
}

/* ============ INTERACCIONES ============ */
function toggleExpand(productId, event) {
  if (event && (event.target.classList.contains('product-check') || event.target.tagName === 'INPUT')) return;
  const el = document.getElementById('prod-' + productId);
  el.classList.toggle('expanded');
}

function toggleActivo(productId, event) {
  event.stopPropagation();
  estado[productId].activo = !estado[productId].activo;
  render();
}

function activarOpcional(productId) {
  estado[productId].activo = true;
  render();
  // Expandir la card recién añadida para que el cliente la vea
  setTimeout(() => {
    const el = document.getElementById('prod-' + productId);
    if (el) el.classList.add('expanded');
  }, 50);
}

function cambiarFormato(productId, idx, label) {
  const producto = PRODUCTS.find(p => p.id === productId);
  const nuevoFormato = producto.formatos.find(f => f.label === label);
  estado[productId].actual[idx].formato = nuevoFormato;
  marcarEditado(productId);
  const wasExpanded = document.getElementById('prod-' + productId).classList.contains('expanded');
  render();
  if (wasExpanded) document.getElementById('prod-' + productId).classList.add('expanded');
}

function cambiarUnidades(productId, idx, valor) {
  const u = parseInt(valor);
  if (isNaN(u) || u < 0) return;
  if (u === 0) {
    estado[productId].actual.splice(idx, 1);
    if (estado[productId].actual.length === 0) {
      estado[productId].activo = false;
    }
  } else {
    estado[productId].actual[idx].unidades = u;
  }
  marcarEditado(productId);
  const wasExpanded = document.getElementById('prod-' + productId).classList.contains('expanded');
  render();
  if (wasExpanded && estado[productId].actual.length > 0) {
    document.getElementById('prod-' + productId).classList.add('expanded');
  }
}

function eliminarFormato(productId, idx) {
  estado[productId].actual.splice(idx, 1);
  if (estado[productId].actual.length === 0) {
    estado[productId].activo = false;
  }
  marcarEditado(productId);
  const wasExpanded = document.getElementById('prod-' + productId).classList.contains('expanded');
  render();
  if (wasExpanded && estado[productId].actual.length > 0) {
    document.getElementById('prod-' + productId).classList.add('expanded');
  }
}

function addFormato(productId) {
  const producto = PRODUCTS.find(p => p.id === productId);
  const formatoDefault = producto.formatos.find(f => f.inKitBuilder) || producto.formatos[0];
  estado[productId].actual.push({ formato: formatoDefault, unidades: 1 });
  estado[productId].activo = true;
  marcarEditado(productId);
  render();
  document.getElementById('prod-' + productId).classList.add('expanded');
}

function marcarEditado(productId) {
  const e = estado[productId];
  if (!e.sugerido) return;
  const sugStr = JSON.stringify(e.sugerido.map(c => ({l: c.formato.label, u: c.unidades})));
  const actStr = JSON.stringify(e.actual.map(c => ({l: c.formato.label, u: c.unidades})));
  e.editado = sugStr !== actStr;
}

function restaurarTodo() {
  for (const producto of PRODUCTS) {
    const e = estado[producto.id];
    if (e && e.sugerido) {
      e.actual = e.sugerido.map(c => ({ formato: c.formato, unidades: c.unidades }));
      e.activo = true;
      e.editado = false;
    }
  }
  render();
}

/* ============ COPIAR LISTA ============ */
function copiarLista() {
  let texto = `LCK KIT — Depósito ${depositoActual}L\n`;
  texto += `${'─'.repeat(28)}\n`;
  let total = 0;
  for (const producto of PRODUCTS) {
    const e = estado[producto.id];
    if (!e || !e.activo || !e.actual || e.actual.length === 0) continue;
    const resumen = e.actual.map(c => `${c.unidades}×${c.formato.label}`).join(' + ');
    const precio = e.actual.reduce((s, c) => s + c.formato.precio * c.unidades, 0);
    texto += `• ${producto.nombre}: ${resumen} — ${precio}€\n`;
    total += precio;
  }
  texto += `${'─'.repeat(28)}\n`;
  texto += `TOTAL PVP: ${total.toFixed(2).replace('.', ',')}€`;
  
  navigator.clipboard.writeText(texto).then(() => {
    showToast('✓ Lista copiada');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = texto;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast('✓ Lista copiada'); }
    catch(e) { showToast('No se pudo copiar'); }
    document.body.removeChild(ta);
  });
}

/* ============ TOAST ============ */
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 2200);
}

/* ============ INIT ============ */
window.addEventListener('load', () => {
  // Cargar mute
  if (localStorage.getItem('lck_muted') === '1') {
    muted = true;
    const btn = document.getElementById('muteBtn');
    btn.textContent = '🔕';
    btn.classList.add('muted');
  }
  // Cargar último depósito
  const ultimo = localStorage.getItem('lck_ultimo_deposito');
  if (ultimo) document.getElementById('depositInput').value = ultimo;
});

// Enter para calcular
document.getElementById('depositInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') calculate();
});
